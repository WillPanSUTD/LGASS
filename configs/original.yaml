# Hyperparameter set hard-coded in the original train.py before the
# config refactor. Paper Table 2 differs (see configs/paper.yaml).
# Kept for transparency: we cannot confirm which set produced the paper's
# headline numbers without retraining both.
#
# Note: the original train.py had a string label `optimizer = 'Adam'`
# that dispatched to torch.optim.AdamW (see train.py:94-101 pre-refactor).
# This config records the actual optimizer instantiated (adamw), not the
# misleading string label.
seed: 42
num_classes: 8
num_points: 16384
epoch: 300
optimizer: adamw                   # actual optimizer the dispatch built
learning_rate: 0.001
batch_size: 4
weight_decay: 0.0001
lr_decay: step                     # StepLR equivalent: decay every step_size epochs
lr_decay_step_size: 20             # MOMENTUM_DECCAY_STEP from original train.py
lr_decay_gamma: 0.5
lr_decay_milestones: []            # unused for step schedule; kept for schema parity
k_neighbors: 16                    # PLACEHOLDER
input_type: normals_only
data_root: data/sealingNail_npz
